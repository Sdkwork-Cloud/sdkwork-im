[package]
name = "web-gateway"
edition.workspace = true
license.workspace = true
version.workspace = true

[[bin]]
name = "craw-chat-server"
path = "src/main.rs"

[dependencies]
axum.workspace = true
craw-chat-api-registry = { path = "../../crates/craw-chat-api-registry" }
craw-chat-openapi = { path = "../../crates/craw-chat-openapi" }
craw-chat-gateway-config = { path = "../../crates/craw-chat-gateway-config" }
craw-chat-gateway-observability = { path = "../../crates/craw-chat-gateway-observability" }
craw-chat-runtime-link = { path = "../../crates/craw-chat-runtime-link" }
futures-util.workspace = true
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
tokio-tungstenite = "0.28.0"

[dev-dependencies]
futures-util.workspace = true
http-body-util.workspace = true
tokio-tungstenite = "0.28.0"
tower.workspace = true
