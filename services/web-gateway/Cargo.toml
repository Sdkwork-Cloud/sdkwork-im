[package]
name = "web-gateway"
edition.workspace = true
license.workspace = true
version.workspace = true

[[bin]]
name = "sdkwork-im-server"
path = "src/main.rs"

[dependencies]
axum.workspace = true
sdkwork-im-api-registry = { path = "../../crates/sdkwork-im-api-registry" }
sdkwork-im-openapi = { path = "../../crates/sdkwork-im-openapi" }
sdkwork-im-gateway-config = { path = "../../crates/sdkwork-im-gateway-config" }
sdkwork-im-gateway-observability = { path = "../../crates/sdkwork-im-gateway-observability" }
sdkwork-im-runtime-link = { path = "../../crates/sdkwork-im-runtime-link" }
futures-util.workspace = true
im-app-context = { path = "../../crates/im-app-context" }
im-platform-contracts = { path = "../../crates/im-platform-contracts" }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde.workspace = true
serde_json.workspace = true
sdkwork-api-config = { path = "../../crates/sdkwork-api-config" }
sdkwork-api-product-runtime = { path = "../../crates/sdkwork-api-product-runtime" }
tokio.workspace = true
tokio-tungstenite = "0.28.0"
tower.workspace = true
tower-http = { version = "0.6.6", features = ["cors"] }
tracing.workspace = true
tracing-subscriber.workspace = true

[dev-dependencies]
futures-util.workspace = true
http-body-util.workspace = true
tokio-tungstenite = "0.28.0"
