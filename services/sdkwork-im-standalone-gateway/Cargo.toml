[package]
name = "sdkwork-im-standalone-gateway"
edition.workspace = true
license.workspace = true
version.workspace = true
description = "Sdkwork IM standalone gateway embedding IAM and application ingress on one bind."

[[bin]]
name = "sdkwork-im-standalone-gateway"
path = "src/main.rs"

[dependencies]
axum.workspace = true
sdkwork-api-config = { path = "../../crates/sdkwork-api-config" }
sdkwork-api-product-runtime = { path = "../../crates/sdkwork-api-product-runtime" }
sdkwork-im-gateway-config = { path = "../../crates/sdkwork-im-gateway-config" }
sdkwork-im-gateway-observability = { path = "../../crates/sdkwork-im-gateway-observability" }
sdkwork-im-gateway = { path = "../sdkwork-im-gateway" }
web_gateway = { package = "sdkwork-im-gateway", path = "../sdkwork-im-gateway" }
sdkwork_router_iam_app_api = { package = "sdkwork-router-iam-app-api", path = "../../../sdkwork-appbase/crates/sdkwork-router-iam-app-api" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { version = "1.48", features = ["macros", "rt-multi-thread", "net", "signal"] }
toml = "0.8"
tower-http = { version = "0.6.6", features = ["cors"] }
tracing.workspace = true
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
