[package]
name = "sdkwork-im-standalone-gateway"
edition.workspace = true
license.workspace = true
version.workspace = true
description = "Sdkwork IM standalone gateway embedding IAM and application ingress on one bind."

[[bin]]
name = "sdkwork-im-standalone-gateway"
path = "src/main.rs"

[dependencies]
axum.workspace = true
sdkwork-api-config = { path = "../../crates/sdkwork-api-config" }
sdkwork-api-product-runtime = { path = "../../crates/sdkwork-api-product-runtime" }
sdkwork-im-cloud-gateway-config = { path = "../../crates/sdkwork-im-cloud-gateway-config" }
sdkwork-im-cloud-gateway-observability = { path = "../../crates/sdkwork-im-cloud-gateway-observability" }
sdkwork-im-cloud-gateway = { path = "../sdkwork-im-cloud-gateway" }
web_gateway = { package = "sdkwork-im-cloud-gateway", path = "../sdkwork-im-cloud-gateway" }
sdkwork_router_iam_app_api = { package = "sdkwork-router-iam-app-api", path = "../../../sdkwork-iam/crates/sdkwork-router-iam-app-api" }
sdkwork_im_service_readiness = { workspace = true }
sdkwork_im_database_pool = { workspace = true }
sdkwork_iam_database_host = { path = "../../../sdkwork-iam/crates/sdkwork-iam-database-host", package = "sdkwork-iam-database-host" }
sdkwork_im_iam_application_bootstrap = { workspace = true }
im-adapters-postgres-journal = { path = "../../adapters/postgres-journal" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { version = "1.48", features = ["macros", "rt-multi-thread", "net", "signal"] }
toml = "0.8"
tower-http = { version = "0.6.6", features = ["cors"] }
tracing.workspace = true
