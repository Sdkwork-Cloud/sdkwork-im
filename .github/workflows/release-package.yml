name: Release Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub Release tag.
        required: true
        default: v0.1.0
      package_version:
        description: Package version used in archive names.
        required: true
        default: 0.1.0
      build_desktop:
        description: Build desktop installers in addition to server archives.
        required: true
        default: true
        type: boolean
      platform:
        description: Platform subset.
        required: true
        default: all
        type: choice
        options:
          - all
          - linux
          - windows
          - macos
      architecture:
        description: CPU architecture subset.
        required: true
        default: all
        type: choice
        options:
          - all
          - x64
          - arm64
      deployment_mode:
        description: Deployment mode subset.
        required: true
        default: all
        type: choice
        options:
          - all
          - server
          - desktop
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

concurrency:
  group: craw-chat-release-package-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan package matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      build_desktop: ${{ steps.plan.outputs.build_desktop }}
      build_server: ${{ steps.plan.outputs.build_server }}
    steps:
      - id: plan
        name: Select runners and package modes
        shell: bash
        env:
          INPUT_PLATFORM: ${{ inputs.platform || 'all' }}
          INPUT_ARCHITECTURE: ${{ inputs.architecture || 'all' }}
          INPUT_DEPLOYMENT_MODE: ${{ inputs.deployment_mode || 'all' }}
          INPUT_BUILD_DESKTOP: ${{ github.event_name == 'push' && 'true' || inputs.build_desktop }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const platforms = [
            { platform: 'linux', architecture: 'x64', os: 'ubuntu-latest', desktop_target: 'x86_64-unknown-linux-gnu' },
            { platform: 'linux', architecture: 'arm64', os: 'ubuntu-24.04-arm', desktop_target: 'aarch64-unknown-linux-gnu' },
            { platform: 'windows', architecture: 'x64', os: 'windows-latest', desktop_target: 'x86_64-pc-windows-msvc' },
            { platform: 'windows', architecture: 'arm64', os: 'windows-11-arm', desktop_target: 'aarch64-pc-windows-msvc' },
            { platform: 'macos', architecture: 'x64', os: 'macos-15-intel', desktop_target: 'x86_64-apple-darwin' },
            { platform: 'macos', architecture: 'arm64', os: 'macos-latest', desktop_target: 'aarch64-apple-darwin' },
          ];

          const selectedPlatform = process.env.INPUT_PLATFORM || 'all';
          const selectedArchitecture = process.env.INPUT_ARCHITECTURE || 'all';
          const selectedMode = process.env.INPUT_DEPLOYMENT_MODE || 'all';
          const isTagPush = process.env.EVENT_NAME === 'push';
          const requestedDesktop = isTagPush || process.env.INPUT_BUILD_DESKTOP === 'true';
          const buildServer = selectedMode === 'all' || selectedMode === 'server';
          const buildDesktop = requestedDesktop && (selectedMode === 'all' || selectedMode === 'desktop');
          const include = platforms.filter((item) =>
            (selectedPlatform === 'all' || item.platform === selectedPlatform)
            && (selectedArchitecture === 'all' || item.architecture === selectedArchitecture)
          );

          if (include.length === 0) {
            throw new Error(`No package runners selected for platform=${selectedPlatform}, architecture=${selectedArchitecture}`);
          }
          if (!['all', 'server', 'desktop'].includes(selectedMode)) {
            throw new Error(`Unsupported deployment mode: ${selectedMode}`);
          }
          if (!buildServer && !buildDesktop) {
            throw new Error('No deployment mode selected for packaging');
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `matrix=${JSON.stringify({ include })}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `build_desktop=${buildDesktop ? 'true' : 'false'}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `build_server=${buildServer ? 'true' : 'false'}\n`);
          NODE

  validate:
    name: Validate release contract
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Validate package plan
        shell: bash
        run: |
          node scripts/release/craw-chat-release-package.test.mjs
          pnpm release:plan -- --check
          pnpm release:package:check -- --json

  build:
    name: Build ${{ matrix.platform }}-${{ matrix.architecture }}
    needs:
      - plan
      - validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    env:
      CRAW_CHAT_RELEASE_VERSION: ${{ github.event_name == 'push' && github.ref_name || inputs.package_version }}
      GH_TOKEN: ${{ github.token }}
      SDKWORK_SHARED_SDK_MODE: git
      SDKWORK_SHARED_SDK_GITHUB_TOKEN: ${{ secrets.SDKWORK_RELEASE_TOKEN || github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'linux' && needs.plan.outputs.build_desktop == 'true'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install Windows desktop dependencies
        if: matrix.platform == 'windows' && needs.plan.outputs.build_desktop == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          dotnet tool install --global wix --version 5.0.2
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build all production artifacts
        if: needs.plan.outputs.build_server == 'true' && needs.plan.outputs.build_desktop == 'true'
        shell: pwsh
        run: pnpm release:build:production -- --target all --target-triple ${{ matrix.desktop_target }}

      - name: Build server production artifacts
        if: needs.plan.outputs.build_server == 'true' && needs.plan.outputs.build_desktop != 'true'
        shell: pwsh
        run: pnpm release:build:production -- --target server

      - name: Build desktop installer artifacts
        if: needs.plan.outputs.build_desktop == 'true' && needs.plan.outputs.build_server != 'true'
        shell: pwsh
        run: pnpm release:build:production -- --target desktop --target-triple ${{ matrix.desktop_target }}

      - name: Stage server package
        if: needs.plan.outputs.build_server == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $packageId = "${{ matrix.platform }}-${{ matrix.architecture }}-server-archive"
          pnpm release:stage -- --package-id $packageId --version $env:CRAW_CHAT_RELEASE_VERSION

      - name: Package server archive
        if: needs.plan.outputs.build_server == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $packageId = "${{ matrix.platform }}-${{ matrix.architecture }}-server-archive"
          pnpm release:package -- --package-id $packageId --version $env:CRAW_CHAT_RELEASE_VERSION

      - name: Validate server archive
        if: needs.plan.outputs.build_server == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $packageId = "${{ matrix.platform }}-${{ matrix.architecture }}-server-archive"
          $artifact = Get-ChildItem -Path "dist/release-packages" -File |
            Where-Object { $_.Name -like "craw-chat-server-${{ matrix.platform }}-${{ matrix.architecture }}-server-*.zip" -or $_.Name -like "craw-chat-server-${{ matrix.platform }}-${{ matrix.architecture }}-server-*.tar.gz" } |
            Where-Object { $_.Name -notlike "*.manifest.json" } |
            Select-Object -First 1
          if (-not $artifact) {
            throw "Missing server release archive for $packageId"
          }
          pnpm release:validate -- --package-id $packageId --artifact-path $artifact.FullName --version $env:CRAW_CHAT_RELEASE_VERSION --json

      - name: Stage desktop package
        if: needs.plan.outputs.build_desktop == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $packageId = "${{ matrix.platform }}-${{ matrix.architecture }}-desktop"
          pnpm release:stage -- --package-id $packageId --version $env:CRAW_CHAT_RELEASE_VERSION

      - name: Package desktop bundle
        if: needs.plan.outputs.build_desktop == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $packageId = "${{ matrix.platform }}-${{ matrix.architecture }}-desktop"
          pnpm release:package -- --package-id $packageId --version $env:CRAW_CHAT_RELEASE_VERSION

      - name: Validate desktop bundle
        if: needs.plan.outputs.build_desktop == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $packageId = "${{ matrix.platform }}-${{ matrix.architecture }}-desktop"
          $artifact = Get-ChildItem -Path "dist/release-packages" -File |
            Where-Object { $_.Name -like "craw-chat-desktop-${{ matrix.platform }}-${{ matrix.architecture }}-desktop-*.zip" } |
            Where-Object { $_.Name -notlike "*.manifest.json" } |
            Select-Object -First 1
          if (-not $artifact) {
            throw "Missing desktop release bundle for $packageId"
          }
          pnpm release:validate -- --package-id $packageId --artifact-path $artifact.FullName --version $env:CRAW_CHAT_RELEASE_VERSION --json

      - name: Scope package manifest
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $aggregateManifest = Join-Path (Get-Location) "dist/release-packages/release-packages-manifest.json"
          if (Test-Path -LiteralPath $aggregateManifest) {
            $scopedManifest = Join-Path (Get-Location) "dist/release-packages/release-packages-manifest-${{ matrix.platform }}-${{ matrix.architecture }}.json"
            Copy-Item -LiteralPath $aggregateManifest -Destination $scopedManifest -Force
            Remove-Item -LiteralPath $aggregateManifest -Force
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: craw-chat-${{ matrix.platform }}-${{ matrix.architecture }}
          path: dist/release-packages/*
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release-upload
          merge-multiple: false

      - name: Prepare release upload directory
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Craw Chat release packages for ${RELEASE_TAG}."
            echo
            echo "Includes server archives and desktop installer bundles produced by the standard craw-chat release scripts."
          } > dist/release-upload/RELEASE_NOTES.md

          find dist/release-upload -mindepth 2 -type f -name 'SHA256SUMS' -delete

          mapfile -t release_files < <(find dist/release-upload -type f \
            ! -name 'RELEASE_NOTES.md' \
            ! -name 'SHA256SUMS' \
            | sort)
          : > dist/release-upload/SHA256SUMS
          for file in "${release_files[@]}"; do
            sha256sum "$file" | sed "s#  .*/#  #" >> dist/release-upload/SHA256SUMS
          done

      - name: Publish release assets
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t assets < <(find dist/release-upload -type f \
            ! -name 'RELEASE_NOTES.md' \
            | sort)
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${assets[@]}" --title "${RELEASE_TAG}" --notes-file dist/release-upload/RELEASE_NOTES.md
          fi
