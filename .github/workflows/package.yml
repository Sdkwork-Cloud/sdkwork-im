name: Package Application

on:
  push:
    tags:
      - v*
      - '*.*.*'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag or source ref to package.
        required: true
        default: v0.1.0
      package_version:
        description: Package version used in artifact names and manifests.
        required: false
        default: ''
      platform:
        description: Platform filter.
        required: true
        default: all
        type: choice
        options:
          - all
          - linux
          - windows
          - macos
      architecture:
        description: CPU architecture filter.
        required: true
        default: all
        type: choice
        options:
          - all
          - x64
          - arm64
      profile:
        description: Runtime profile filter.
        required: true
        default: all
        type: choice
        options:
          - all
          - server
          - desktop
      format:
        description: Package format filter.
        required: true
        default: all
        type: choice
        options:
          - all
          - zip
          - tar.gz
      deploy:
        description: Run configured deployment environments after packaging.
        required: true
        default: false
        type: boolean
      sdkwork_app_topology_ref:
        description: sdkwork-app-topology commit/ref.
        required: false
        default: main
      sdkwork_appbase_ref:
        description: sdkwork-appbase commit/ref.
        required: false
        default: 4e287906b0d712213f8b6ede39b505aac3a67722
      sdkwork_core_ref:
        description: sdkwork-core commit/ref.
        required: false
        default: fd64773e8f73ce38f6995ded0ee63c00d6c5e675
      sdkwork_database_ref:
        description: sdkwork-database commit/ref.
        required: false
        default: main
      sdkwork_web_framework_ref:
        description: sdkwork-web-framework commit/ref.
        required: false
        default: main
      sdkwork_rpc_framework_ref:
        description: sdkwork-rpc-framework commit/ref.
        required: false
        default: main
      sdkwork_utils_ref:
        description: sdkwork-utils commit/ref.
        required: false
        default: main
      sdkwork_ui_ref:
        description: sdkwork-ui commit/ref.
        required: false
        default: 672b9a990cdd077422f60651fbc9413b44343ab2
      sdkwork_voice_ref:
        description: sdkwork-voice commit/ref.
        required: false
        default: main
      sdkwork_drive_ref:
        description: sdkwork-drive commit/ref.
        required: false
        default: 5ee91f5162d114edf2a10165916436aa03f97b4a
      sdkwork_iam_ref:
        description: sdkwork-iam commit/ref.
        required: false
        default: main
      sdkwork_account_ref:
        description: sdkwork-account commit/ref.
        required: false
        default: main
      sdkwork_catalog_ref:
        description: sdkwork-catalog commit/ref.
        required: false
        default: main
      sdkwork_inventory_ref:
        description: sdkwork-inventory commit/ref.
        required: false
        default: main
      sdkwork_invoice_ref:
        description: sdkwork-invoice commit/ref.
        required: false
        default: main
      sdkwork_membership_ref:
        description: sdkwork-membership commit/ref.
        required: false
        default: main
      sdkwork_merchandise_ref:
        description: sdkwork-merchandise commit/ref.
        required: false
        default: main
      sdkwork_order_ref:
        description: sdkwork-order commit/ref.
        required: false
        default: main
      sdkwork_payment_ref:
        description: sdkwork-payment commit/ref.
        required: false
        default: main
      sdkwork_promotion_ref:
        description: sdkwork-promotion commit/ref.
        required: false
        default: main
      sdkwork_shop_ref:
        description: sdkwork-shop commit/ref.
        required: false
        default: main
      sdkwork_agents_ref:
        description: sdkwork-agents commit/ref.
        required: false
        default: main
      sdkwork_mail_ref:
        description: sdkwork-mail commit/ref.
        required: false
        default: 55296ee2738c1665f8228c6c00c99f2d8d681251
      sdkwork_community_ref:
        description: sdkwork-community commit/ref.
        required: false
        default: b850b99b5948b2f233dd6e6c5fa0b820343389df
      sdkwork_course_ref:
        description: sdkwork-course commit/ref.
        required: false
        default: e367b334397bbf6a1fef37986cc7e6e9074e8170
      sdkwork_notary_ref:
        description: sdkwork-notary commit/ref.
        required: false
        default: 3d7a1943c9df771bcfee1548d97ff892b7b01cf2
      sdkwork_knowledgebase_ref:
        description: sdkwork-knowledgebase commit/ref.
        required: false
        default: 2f092afa9cd713cd920bd2a7fdea59bc3d956ce8
      sdkwork_rtc_ref:
        description: sdkwork-rtc commit/ref.
        required: false
        default: 1c1ff3b753a2e856faeef58f3a62a9bd153041e1
      sdkwork_kernel_ref:
        description: sdkwork-kernel commit/ref.
        required: false
        default: 3bd785900224f7519a60477419edb79424be1bea
      sdkwork_aiot_ref:
        description: sdkwork-aiot commit/ref.
        required: false
        default: ca545c873d17bdcf92a9de6b4a1c47dc07481adf
      sdkwork_sdk_commons_ref:
        description: sdkwork-sdk-commons commit/ref.
        required: false
        default: c9adc5a02fed0d9ce70ab719e5d2155ed40676da
      sdkwork_sdk_generator_ref:
        description: sdkwork-sdk-generator commit/ref.
        required: false
        default: 715562e30be876661a1c78f4a84b058e75aba937

permissions:
  contents: write
  actions: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  package:
    uses: Sdkwork-Cloud/sdkwork-github-workflow/.github/workflows/sdkwork-package.yml@b0829529b9277a3da32b90c2d36ff34ff09fa832
    with:
      config_path: sdkwork.workflow.json
      tag: ${{ github.event.inputs.tag || github.event.release.tag_name || github.ref_name }}
      package_version: ${{ github.event.inputs.package_version || '' }}
      platform: ${{ github.event.inputs.platform || 'all' }}
      architecture: ${{ github.event.inputs.architecture || 'all' }}
      profile: ${{ github.event.inputs.profile || 'all' }}
      format: ${{ github.event.inputs.format || 'all' }}
      publish_release: true
      upload_artifact: true
      deploy: ${{ github.event.inputs.deploy == 'true' || github.event_name == 'release' }}
      retention_days: 30
      framework_ref: b0829529b9277a3da32b90c2d36ff34ff09fa832
      dependency_refs_json: >-
        {
          "SDKWORK_APP_TOPOLOGY_REF": "${{ github.event.inputs.sdkwork_app_topology_ref || vars.SDKWORK_APP_TOPOLOGY_REF }}",
          "SDKWORK_APPBASE_REF": "${{ github.event.inputs.sdkwork_appbase_ref || vars.SDKWORK_APPBASE_REF }}",
          "SDKWORK_CORE_REF": "${{ github.event.inputs.sdkwork_core_ref || vars.SDKWORK_CORE_REF }}",
          "SDKWORK_DATABASE_REF": "${{ github.event.inputs.sdkwork_database_ref || vars.SDKWORK_DATABASE_REF }}",
          "SDKWORK_WEB_FRAMEWORK_REF": "${{ github.event.inputs.sdkwork_web_framework_ref || vars.SDKWORK_WEB_FRAMEWORK_REF }}",
          "SDKWORK_RPC_FRAMEWORK_REF": "${{ github.event.inputs.sdkwork_rpc_framework_ref || vars.SDKWORK_RPC_FRAMEWORK_REF }}",
          "SDKWORK_UTILS_REF": "${{ github.event.inputs.sdkwork_utils_ref || vars.SDKWORK_UTILS_REF }}",
          "SDKWORK_UI_REF": "${{ github.event.inputs.sdkwork_ui_ref || vars.SDKWORK_UI_REF }}",
          "SDKWORK_VOICE_REF": "${{ github.event.inputs.sdkwork_voice_ref || vars.SDKWORK_VOICE_REF }}",
          "SDKWORK_DRIVE_REF": "${{ github.event.inputs.sdkwork_drive_ref || vars.SDKWORK_DRIVE_REF }}",
          "SDKWORK_IAM_REF": "${{ github.event.inputs.sdkwork_iam_ref || vars.SDKWORK_IAM_REF }}",
          "SDKWORK_ACCOUNT_REF": "${{ github.event.inputs.sdkwork_account_ref || vars.SDKWORK_ACCOUNT_REF }}",
          "SDKWORK_CATALOG_REF": "${{ github.event.inputs.sdkwork_catalog_ref || vars.SDKWORK_CATALOG_REF }}",
          "SDKWORK_INVENTORY_REF": "${{ github.event.inputs.sdkwork_inventory_ref || vars.SDKWORK_INVENTORY_REF }}",
          "SDKWORK_INVOICE_REF": "${{ github.event.inputs.sdkwork_invoice_ref || vars.SDKWORK_INVOICE_REF }}",
          "SDKWORK_MEMBERSHIP_REF": "${{ github.event.inputs.sdkwork_membership_ref || vars.SDKWORK_MEMBERSHIP_REF }}",
          "SDKWORK_MERCHANDISE_REF": "${{ github.event.inputs.sdkwork_merchandise_ref || vars.SDKWORK_MERCHANDISE_REF }}",
          "SDKWORK_ORDER_REF": "${{ github.event.inputs.sdkwork_order_ref || vars.SDKWORK_ORDER_REF }}",
          "SDKWORK_PAYMENT_REF": "${{ github.event.inputs.sdkwork_payment_ref || vars.SDKWORK_PAYMENT_REF }}",
          "SDKWORK_PROMOTION_REF": "${{ github.event.inputs.sdkwork_promotion_ref || vars.SDKWORK_PROMOTION_REF }}",
          "SDKWORK_SHOP_REF": "${{ github.event.inputs.sdkwork_shop_ref || vars.SDKWORK_SHOP_REF }}",
          "SDKWORK_AGENTS_REF": "${{ github.event.inputs.sdkwork_agents_ref || vars.SDKWORK_AGENTS_REF }}",
          "SDKWORK_MAIL_REF": "${{ github.event.inputs.sdkwork_mail_ref || vars.SDKWORK_MAIL_REF }}",
          "SDKWORK_COMMUNITY_REF": "${{ github.event.inputs.sdkwork_community_ref || vars.SDKWORK_COMMUNITY_REF }}",
          "SDKWORK_COURSE_REF": "${{ github.event.inputs.sdkwork_course_ref || vars.SDKWORK_COURSE_REF }}",
          "SDKWORK_NOTARY_REF": "${{ github.event.inputs.sdkwork_notary_ref || vars.SDKWORK_NOTARY_REF }}",
          "SDKWORK_KNOWLEDGEBASE_REF": "${{ github.event.inputs.sdkwork_knowledgebase_ref || vars.SDKWORK_KNOWLEDGEBASE_REF }}",
          "SDKWORK_RTC_REF": "${{ github.event.inputs.sdkwork_rtc_ref || vars.SDKWORK_RTC_REF }}",
          "SDKWORK_KERNEL_REF": "${{ github.event.inputs.sdkwork_kernel_ref || vars.SDKWORK_KERNEL_REF }}",
          "SDKWORK_AIOT_REF": "${{ github.event.inputs.sdkwork_aiot_ref || vars.SDKWORK_AIOT_REF }}",
          "SDKWORK_SDK_COMMONS_REF": "${{ github.event.inputs.sdkwork_sdk_commons_ref || vars.SDKWORK_SDK_COMMONS_REF }}",
          "SDKWORK_SDK_GENERATOR_REF": "${{ github.event.inputs.sdkwork_sdk_generator_ref || vars.SDKWORK_SDK_GENERATOR_REF }}"
        }
    secrets: inherit
