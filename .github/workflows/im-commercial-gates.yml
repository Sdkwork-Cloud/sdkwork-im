name: IM Commercial Gates

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: im-commercial-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-runtime-tests:
    name: Core Runtime Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust Artifacts
        uses: swatinem/rust-cache@v2

      - name: Test conversation-runtime
        run: cargo test -p conversation-runtime --tests

      - name: Test conversation-runtime duplicate direct-chat binding
        run: cargo test -p conversation-runtime --test conversation_flow_test test_duplicate_bind_direct_chat_conversation_is_idempotent_and_conflicting_retry_is_rejected -- --exact

      - name: Test conversation-runtime duplicate direct-chat binding over HTTP
        run: cargo test -p conversation-runtime --test http_smoke_test test_duplicate_bind_direct_chat_conversation_request_is_idempotent_and_conflicting_retry_is_rejected_over_http -- --exact

      - name: Test conversation-runtime oversized creator attributes
        run: cargo test -p conversation-runtime --test conversation_flow_test test_create_conversation_rejects_oversized_creator_attributes -- --exact

      - name: Test conversation-runtime oversized member attributes over HTTP
        run: cargo test -p conversation-runtime --test http_smoke_test test_add_member_rejects_oversized_attributes_over_http -- --exact

      - name: Test conversation-runtime oversized sender metadata
        run: cargo test -p conversation-runtime --test conversation_flow_test test_post_message_rejects_oversized_sender_metadata -- --exact

      - name: Test conversation-runtime oversized render hints
        run: cargo test -p conversation-runtime --test conversation_flow_test test_post_message_rejects_oversized_render_hints -- --exact

      - name: Test control-plane-api
        run: cargo test -p control-plane-api --tests

      - name: Test provider policy diff version range contract
        run: cargo test -p im-platform-contracts --test provider_registry_contract_test test_runtime_provider_registry_rejects_reversed_policy_diff_version_range -- --exact

      - name: Test control-plane provider policy diff version range over HTTP
        run: cargo test -p control-plane-api --test provider_registry_test test_control_plane_rejects_provider_policy_diff_with_reversed_version_range -- --exact

      - name: Test provider tenant override rejects empty tenant id
        run: cargo test -p im-platform-contracts --test provider_registry_contract_test test_runtime_provider_registry_rejects_empty_tenant_override_id -- --exact

      - name: Test control-plane provider bindings rejects empty tenant query
        run: cargo test -p control-plane-api --test governance_loop_test test_control_plane_rejects_empty_tenant_provider_bindings_query_without_polluting_ops_runtime -- --exact

      - name: Test control-plane provider policy write rejects empty tenant id
        run: cargo test -p control-plane-api --test governance_loop_test test_control_plane_rejects_empty_tenant_provider_policy_write_without_mutating_ops_or_audit -- --exact

      - name: Test provider tenant override rejects oversized tenant id
        run: cargo test -p im-platform-contracts --test provider_registry_contract_test test_runtime_provider_registry_rejects_oversized_tenant_override_id -- --exact

      - name: Test control-plane provider bindings rejects oversized tenant query
        run: cargo test -p control-plane-api --test governance_loop_test test_control_plane_rejects_oversized_tenant_provider_bindings_query_without_polluting_ops_runtime -- --exact

      - name: Test control-plane provider policy write rejects oversized tenant id
        run: cargo test -p control-plane-api --test governance_loop_test test_control_plane_rejects_oversized_tenant_provider_policy_write_without_mutating_ops_or_audit -- --exact

      - name: Test session-gateway
        run: cargo test -p session-gateway --tests

      - name: Test session-gateway device registration actor-kind conflict
        run: cargo test -p session-gateway --test http_smoke_test test_session_resume_rejects_same_device_id_with_different_actor_kind_over_http -- --exact

      - name: Test session-gateway device registration principal conflict
        run: cargo test -p session-gateway --test http_smoke_test test_session_resume_rejects_same_device_id_with_different_principal_over_http -- --exact

      - name: Test session-gateway oversized realtime event types payload
        run: cargo test -p session-gateway --test http_smoke_test test_realtime_subscription_sync_rejects_oversized_event_types_payload_over_http -- --exact

      - name: Test session-gateway excessive realtime subscription item count
        run: cargo test -p session-gateway --test http_smoke_test test_realtime_subscription_sync_rejects_too_many_items_over_http -- --exact

      - name: Test session-gateway websocket oversized request id
        run: cargo test -p session-gateway --test websocket_smoke_test test_realtime_websocket_rejects_oversized_request_id -- --exact

      - name: Test session-gateway websocket oversized frame type
        run: cargo test -p session-gateway --test websocket_smoke_test test_realtime_websocket_rejects_oversized_frame_type -- --exact

      - name: Test session-gateway device registration suppresses conflicting provider side effects
        run: cargo test -p session-gateway --test device_access_provider_mainline_test test_conflicting_session_resume_does_not_call_provider_for_second_owner -- --exact

      - name: Test projection-service
        run: cargo test -p projection-service --tests

      - name: Test projection timeline actor-kind isolation
        run: cargo test -p projection-service --test http_smoke_test test_timeline_query_rejects_same_actor_id_with_different_actor_kind_over_http -- --exact

      - name: Test projection contacts actor-kind isolation
        run: cargo test -p projection-service --test http_smoke_test test_contacts_query_rejects_same_actor_id_with_different_actor_kind_over_http -- --exact

      - name: Test projection device registration actor-kind conflict
        run: cargo test -p projection-service --test http_smoke_test test_device_registration_rejects_same_device_id_with_different_actor_kind_over_http -- --exact

      - name: Test projection device registration principal conflict
        run: cargo test -p projection-service --test http_smoke_test test_device_registration_rejects_same_device_id_with_different_principal_over_http -- --exact

      - name: Test projection device sync actor-kind isolation
        run: cargo test -p projection-service --test http_smoke_test test_device_sync_feed_isolated_by_actor_kind_over_http -- --exact

      - name: Test local-minimal end-to-end flow
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_runs_end_to_end_flow -- --exact

      - name: Test local-minimal preserves add-member request attributes
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_preserves_add_member_request_attributes_for_non_user_principal -- --exact

      - name: Test local-minimal oversized render hints
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_rejects_oversized_render_hints_on_post_message -- --exact

      - name: Test local-minimal commercial gate contract
        run: cargo test -p local-minimal-node --test commercial_gate_contract_test

      - name: Test local-minimal device registration suppresses conflicting provider side effects
        run: cargo test -p local-minimal-node --test device_access_provider_mainline_test test_conflicting_device_register_does_not_call_provider_for_second_owner -- --exact

      - name: Test local-minimal user-module oversized creator attributes
        run: cargo test -p local-minimal-node --test user_module_provider_mainline_test test_local_user_module_provider_rejects_oversized_creator_attributes_on_create_conversation -- --exact

      - name: Test local-minimal user-module oversized sender metadata
        run: cargo test -p local-minimal-node --test user_module_provider_mainline_test test_local_user_module_provider_rejects_oversized_sender_metadata_on_post_message -- --exact

      - name: Test local-minimal user-module merges add-member request attributes
        run: cargo test -p local-minimal-node --test user_module_provider_mainline_test test_local_user_module_provider_merges_add_member_request_attributes -- --exact

      - name: Strict clippy core runtime scope
        run: cargo clippy -p conversation-runtime -p control-plane-api --tests -- -D warnings

      - name: Strict clippy conversation-runtime and local-minimal scope
        run: cargo clippy --no-deps -p conversation-runtime -p local-minimal-node --tests -- -D warnings

  downstream-exactly-once-tests:
    name: Downstream Exactly Once
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust Artifacts
        uses: swatinem/rust-cache@v2

      - name: Test rtc-signaling-service
        run: cargo test -p rtc-signaling-service --tests

      - name: Test media-service
        run: cargo test -p media-service --tests

      - name: Test streaming-service
        run: cargo test -p streaming-service --tests

      - name: Test audit-service
        run: cargo test -p audit-service --tests

      - name: Test rtc duplicate session create
        run: cargo test -p rtc-signaling-service --test http_smoke_test test_duplicate_rtc_session_create_is_idempotent_and_conflicting_retry_is_rejected -- --exact

      - name: Test rtc duplicate session create actor-kind scope
        run: cargo test -p rtc-signaling-service --test http_smoke_test test_duplicate_rtc_session_create_with_same_actor_id_but_different_actor_kind_is_conflict -- --exact

      - name: Test rtc provider callback oversized payload json
        run: cargo test -p rtc-signaling-service --test http_smoke_test test_map_rtc_provider_callback_rejects_oversized_payload_json_over_http -- --exact

      - name: Test local-minimal duplicate rtc create
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_treats_duplicate_rtc_session_create_as_idempotent -- --exact

      - name: Test local-minimal rtc actor-kind scope conflict
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_rejects_duplicate_rtc_create_from_different_actor_kind -- --exact

      - name: Test local-minimal rtc duplicate side-effect suppression
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_suppresses_duplicate_rtc_state_side_effects -- --exact

      - name: Test media duplicate completion retry
        run: cargo test -p media-service --test provider_integration_test test_duplicate_complete_upload_retry_uses_existing_asset_without_reinvoking_provider -- --exact

      - name: Test media download url zero ttl rejection
        run: cargo test -p media-service --test provider_integration_test test_get_media_download_url_rejects_zero_ttl_over_http -- --exact

      - name: Test local-minimal realtime limit guardrail
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_rejects_realtime_limit_above_guardrail_over_http -- --exact

      - name: Test local-minimal duplicate media upload
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_treats_duplicate_media_upload_requests_as_idempotent -- --exact

      - name: Test stream duplicate open
        run: cargo test -p streaming-service --test stream_lifecycle_test test_duplicate_open_stream_is_idempotent_and_conflicting_retry_is_rejected -- --exact

      - name: Test stream duplicate open actor scope conflict
        run: cargo test -p streaming-service --test stream_lifecycle_test test_duplicate_open_stream_with_different_actor_is_conflict -- --exact

      - name: Test stream oversized durability class
        run: cargo test -p streaming-service --test http_smoke_test test_open_stream_rejects_oversized_durability_class_over_http -- --exact

      - name: Test stream oversized list stream id
        run: cargo test -p streaming-service --test stream_lifecycle_test test_stream_list_rejects_oversized_stream_id_over_http -- --exact

      - name: Test stream request-scope append owner access
        run: cargo test -p streaming-service --test stream_lifecycle_test test_request_scoped_stream_append_rejects_different_actor_over_http -- --exact

      - name: Test local-minimal duplicate open stream
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_treats_duplicate_open_stream_as_idempotent -- --exact

      - name: Test local-minimal duplicate open stream actor scope conflict
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_rejects_duplicate_open_stream_from_different_actor -- --exact

      - name: Test local-minimal request stream owner access
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_rejects_request_stream_list_from_different_actor -- --exact

      - name: Test local-minimal oversized list stream id
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_rejects_oversized_stream_id_on_list_frames_over_http -- --exact

      - name: Test stream duplicate complete
        run: cargo test -p streaming-service --test stream_lifecycle_test test_duplicate_complete_stream_request_is_idempotent_and_conflicting_retry_is_rejected -- --exact

      - name: Test stream duplicate complete actor scope conflict
        run: cargo test -p streaming-service --test stream_lifecycle_test test_duplicate_complete_stream_request_with_different_actor_is_not_found -- --exact

      - name: Test stream oversized complete result message id
        run: cargo test -p streaming-service --test stream_lifecycle_test test_stream_complete_rejects_oversized_result_message_id_over_http -- --exact

      - name: Test local-minimal duplicate complete fanout suppression
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_does_not_refanout_duplicate_stream_complete_retry -- --exact

      - name: Test stream duplicate abort
        run: cargo test -p streaming-service --test stream_lifecycle_test test_duplicate_abort_stream_request_is_idempotent_and_conflicting_retry_is_rejected -- --exact

      - name: Test stream duplicate abort actor scope conflict
        run: cargo test -p streaming-service --test stream_lifecycle_test test_duplicate_abort_stream_request_with_different_actor_is_not_found -- --exact

      - name: Test stream oversized abort reason
        run: cargo test -p streaming-service --test stream_lifecycle_test test_stream_abort_rejects_oversized_reason_over_http -- --exact

      - name: Test local-minimal duplicate abort fanout suppression
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_does_not_refanout_duplicate_stream_abort_retry -- --exact

      - name: Test stream checkpoint replay
        run: cargo test -p streaming-service --test stream_lifecycle_test test_duplicate_checkpoint_stream_request_replays_after_stream_completes -- --exact

      - name: Test stream checkpoint actor scope conflict
        run: cargo test -p streaming-service --test stream_lifecycle_test test_duplicate_checkpoint_stream_request_with_different_actor_is_not_found -- --exact

      - name: Test local-minimal duplicate checkpoint replay
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_replays_duplicate_checkpoint_retry_after_complete -- --exact

      - name: Test audit duplicate anchor
        run: cargo test -p audit-service --test http_smoke_test test_duplicate_record_anchor_request_is_idempotent_and_conflicting_retry_is_rejected -- --exact

      - name: Test audit duplicate anchor after session rotation
        run: cargo test -p audit-service --test http_smoke_test test_duplicate_record_anchor_request_replays_after_session_rotation -- --exact

      - name: Test local-minimal duplicate audit anchor
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_treats_duplicate_audit_anchor_as_idempotent -- --exact

      - name: Test local-minimal duplicate audit anchor after session rotation
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_replays_duplicate_audit_anchor_after_session_rotation -- --exact

      - name: Strict clippy downstream exactly-once scope
        run: cargo clippy --no-deps -p rtc-signaling-service -p media-service -p streaming-service -p audit-service -p local-minimal-node --tests -- -D warnings

  windows-commercial-smoke:
    name: Windows Commercial Smoke
    runs-on: windows-latest
    timeout-minutes: 75
    env:
      CARGO_TARGET_DIR: D:/ctg
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust Artifacts
        uses: swatinem/rust-cache@v2

      - name: Test notification-service
        run: cargo test -p notification-service --tests

      - name: Test notification duplicate request idempotency
        run: cargo test -p notification-service --test http_smoke_test test_duplicate_notification_id_is_idempotent_and_conflicting_retry_is_rejected_over_http -- --exact

      - name: Test notification actor-kind inbox isolation
        run: cargo test -p notification-service --test http_smoke_test test_notification_queries_reject_same_actor_id_with_different_actor_kind_over_http -- --exact

      - name: Test automation-service
        run: cargo test -p automation-service --tests

      - name: Test automation duplicate execution idempotency
        run: cargo test -p automation-service --test http_smoke_test test_duplicate_execution_id_is_idempotent_and_conflicting_retry_is_rejected_over_http -- --exact

      - name: Test local-minimal task10 capabilities
        run: cargo test -p local-minimal-node --test task10_capabilities_e2e_test

      - name: Test local-minimal duplicate automation request idempotency
        run: cargo test -p local-minimal-node --test task10_capabilities_e2e_test test_local_minimal_profile_treats_duplicate_automation_request_as_idempotent -- --exact

      - name: Test local-minimal automation notification actor-kind isolation
        run: cargo test -p local-minimal-node --test task10_capabilities_e2e_test test_local_minimal_profile_isolates_automation_notifications_by_actor_kind -- --exact

      - name: Test local-minimal automation audit actor-kind isolation
        run: cargo test -p local-minimal-node --test task10_capabilities_e2e_test test_local_minimal_profile_records_automation_audit_per_actor_kind -- --exact

      - name: Test local-minimal duplicate notification request idempotency
        run: cargo test -p local-minimal-node --test task10_capabilities_e2e_test test_local_minimal_profile_treats_duplicate_notification_request_as_idempotent -- --exact

      - name: Test local-minimal notification actor-kind inbox isolation
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_rejects_notification_queries_from_different_actor_kind -- --exact

      - name: Test local-minimal contacts actor-kind isolation
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_rejects_same_actor_id_with_different_actor_kind_on_contacts_query -- --exact

      - name: Test local-minimal device stream actor-kind isolation
        run: cargo test -p local-minimal-node --test device_stream_e2e_test test_local_minimal_profile_device_stream_rejects_same_actor_id_different_actor_kind -- --exact

      - name: Test local-minimal user actor cannot inherit system device command access
        run: cargo test -p local-minimal-node --test device_stream_e2e_test test_local_minimal_profile_user_actor_cannot_inherit_system_device_command_access -- --exact

      - name: Test local-minimal public auth
        run: cargo test -p local-minimal-node --test public_auth_e2e_test

      - name: Test local-minimal direct-chat binding idempotency
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_treats_duplicate_direct_chat_binding_as_idempotent -- --exact

      - name: Test local-minimal duplicate message fanout suppression
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_does_not_refanout_duplicate_message_post_retry -- --exact

      - name: Test local-minimal duplicate stream fanout suppression
        run: cargo test -p local-minimal-node --test http_e2e_test test_local_minimal_profile_does_not_refanout_duplicate_stream_frame_retry -- --exact

      - name: Strict clippy Windows smoke scope
        run: cargo clippy -p notification-service -p automation-service -p local-minimal-node --tests -- -D warnings

  performance-smoke:
    name: Performance Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Artifacts
        uses: swatinem/rust-cache@v2

      - name: Step11 Quant Baseline
        run: cargo test -p local-minimal-node --test performance_quant_baseline_test -- --nocapture

      - name: Step11 HA/DR Drill Baseline
        run: cargo test -p local-minimal-node --test performance_ha_dr_drill_test -- --nocapture

      - name: Step11 Drill Catalog Contract
        run: cargo test -p local-minimal-node --test performance_drill_catalog_test -- --nocapture

  supply-chain-security:
    name: Supply Chain Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Artifacts
        uses: swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit
        run: cargo audit --deny warnings
