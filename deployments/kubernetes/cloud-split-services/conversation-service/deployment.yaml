apiVersion: apps/v1
kind: Deployment
metadata:
  name: conversation-service
  namespace: sdkwork-im
  labels:
    app.kubernetes.io/name: conversation-service
    app.kubernetes.io/component: comms
    app.kubernetes.io/part-of: sdkwork-im
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: conversation-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: conversation-service
        app.kubernetes.io/component: comms
    spec:
      containers:
        - name: conversation-service
          image: ghcr.io/sdkwork/conversation-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 18082
          envFrom:
            - configMapRef:
                name: conversation-service-runtime
            - secretRef:
                name: conversation-service-secrets
                optional: true
          env:
            - name: SDKWORK_IM_ENVIRONMENT
              value: production
            - name: SDKWORK_IM_DEPLOYMENT_PROFILE
              value: cloud
            - name: OTEL_SERVICE_NAME
              value: sdkwork-im-conversation-service
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: conversation-service
  namespace: sdkwork-im
  labels:
    app.kubernetes.io/name: conversation-service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: conversation-service
  ports:
    - name: http
      port: 18082
      targetPort: http
