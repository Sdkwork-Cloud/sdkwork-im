apiVersion: apps/v1
kind: Deployment
metadata:
  name: governance-service
  namespace: sdkwork-im
  labels:
    app.kubernetes.io/name: governance-service
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/part-of: sdkwork-im
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: governance-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: governance-service
        app.kubernetes.io/component: control-plane
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: governance-service
          image: ghcr.io/sdkwork/governance-service:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 18081
          envFrom:
            - configMapRef:
                name: governance-service-runtime
            - secretRef:
                name: governance-service-secrets
                optional: true
          env:
            - name: SDKWORK_IM_ENVIRONMENT
              value: production
            - name: SDKWORK_IM_DEPLOYMENT_PROFILE
              value: cloud
            - name: OTEL_SERVICE_NAME
              value: sdkwork-im-governance-service
            - name: TMPDIR
              value: /tmp
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: governance-service
  namespace: sdkwork-im
  labels:
    app.kubernetes.io/name: governance-service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: governance-service
  ports:
    - name: http
      port: 18081
      targetPort: http
