apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: sdkwork-im
  labels:
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/component: notification
    app.kubernetes.io/part-of: sdkwork-im
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: notification-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification-service
        app.kubernetes.io/component: notification
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/sdkwork/notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 18087
          envFrom:
            - configMapRef:
                name: notification-service-runtime
            - secretRef:
                name: notification-service-secrets
                optional: true
          env:
            - name: SDKWORK_IM_ENVIRONMENT
              value: production
            - name: SDKWORK_IM_DEPLOYMENT_PROFILE
              value: cloud
            - name: OTEL_SERVICE_NAME
              value: sdkwork-im-notification-service
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: sdkwork-im
  labels:
    app.kubernetes.io/name: notification-service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: notification-service
  ports:
    - name: http
      port: 18087
      targetPort: http
