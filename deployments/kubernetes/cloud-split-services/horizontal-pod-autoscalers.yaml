apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: session-gateway-hpa
  namespace: sdkwork-im
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: session-gateway
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
