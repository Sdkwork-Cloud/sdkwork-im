# Additional cloud-split service deployments: audit, automation, social, space,
# contact, interaction, ops.
# All deployments enforce Restricted Pod Security Standards:
#   - runAsNonRoot, non-privileged, read-only root filesystem
#   - seccomp RuntimeDefault, all Linux capabilities dropped
#   - imagePullSecrets for private registry authentication
#   - writable /tmp via emptyDir volume
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: sdkwork-im
  labels:
    app.kubernetes.io/name: audit-service
    app.kubernetes.io/component: audit
    app.kubernetes.io/part-of: sdkwork-im
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: audit-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audit-service
        app.kubernetes.io/component: audit
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: audit-service
          image: ghcr.io/sdkwork/audit-service:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 18090
          envFrom:
            - configMapRef:
                name: audit-service-runtime
            - secretRef:
                name: audit-service-secrets
                optional: true
          env:
            - name: SDKWORK_IM_ENVIRONMENT
              value: production
            - name: SDKWORK_IM_DEPLOYMENT_PROFILE
              value: cloud
            - name: OTEL_SERVICE_NAME
              value: sdkwork-im-audit-service
            - name: TMPDIR
              value: /tmp
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: audit-service
  namespace: sdkwork-im
  labels:
    app.kubernetes.io/name: audit-service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: audit-service
  ports:
    - name: http
      port: 18090
      targetPort: http
