apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-gateway
  namespace: sdkwork-im
  labels:
    app.kubernetes.io/name: session-gateway
    app.kubernetes.io/component: realtime
    app.kubernetes.io/part-of: sdkwork-im
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: session-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: session-gateway
        app.kubernetes.io/component: realtime
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: session-gateway
          image: ghcr.io/sdkwork/session-gateway:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 18080
          envFrom:
            - configMapRef:
                name: session-gateway-runtime
            - secretRef:
                name: session-gateway-secrets
                optional: true
          env:
            - name: SDKWORK_IM_ENVIRONMENT
              value: production
            - name: SDKWORK_IM_DEPLOYMENT_PROFILE
              value: cloud
            - name: OTEL_SERVICE_NAME
              value: sdkwork-im-session-gateway
            - name: TMPDIR
              value: /tmp
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: session-gateway
  namespace: sdkwork-im
  labels:
    app.kubernetes.io/name: session-gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: session-gateway
  ports:
    - name: http
      port: 18080
      targetPort: http
