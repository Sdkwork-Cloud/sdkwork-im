apiVersion: apps/v1
kind: Deployment
metadata:
  name: im-gateway
  namespace: sdkwork-im
  labels:
    app.kubernetes.io/name: im-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: sdkwork-im
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: im-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: im-gateway
        app.kubernetes.io/component: gateway
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: im-gateway
          image: ghcr.io/sdkwork/chat-server:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - /opt/sdkwork/chat/bin/sdkwork-im-server
          args:
            - --config
            - /etc/sdkwork/chat/chat.toml
          ports:
            - name: http
              containerPort: 18079
          envFrom:
            - configMapRef:
                name: im-gateway-runtime
            - secretRef:
                name: im-gateway-secrets
                optional: true
          env:
            - name: SDKWORK_IM_ENVIRONMENT
              value: production
            - name: SDKWORK_IM_DEPLOYMENT_PROFILE
              value: cloud
            - name: SDKWORK_IM_SERVICE_LAYOUT
              value: split-services
            - name: SDKWORK_IM_APPLICATION_PUBLIC_INGRESS_BIND
              value: 0.0.0.0:18079
            - name: OTEL_SERVICE_NAME
              value: sdkwork-im-cloud-gateway
            - name: TMPDIR
              value: /tmp
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: runtime-config
              mountPath: /etc/sdkwork/chat
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: runtime-config
          configMap:
            name: im-gateway-config
        - name: tmp
          emptyDir: {}
