# Secret template for shared database and Redis credentials.
# Replace placeholder values with actual credentials before applying.
# Use `kubectl create secret generic sdkwork-im-shared-secrets --from-literal=...` for production.
apiVersion: v1
kind: Secret
metadata:
  name: sdkwork-im-shared-secrets
  namespace: sdkwork-im
  labels:
    app.kubernetes.io/part-of: sdkwork-im
type: Opaque
stringData:
  # PostgreSQL connection URL (replace host, port, db, user, password).
  DATABASE_URL: postgres://sdkwork_im:CHANGE_ME@postgres.database.svc:5432/sdkwork_im
  # Redis connection URL (replace host, port, password).
  REDIS_URL: redis://:CHANGE_ME@redis.cache.svc:6379/0
  # JWT signing secret for session tokens.
  JWT_SIGNING_KEY: CHANGE_ME_TO_RANDOM_64_CHAR_STRING
  # Object storage (S3) credentials for media service.
  S3_ACCESS_KEY_ID: CHANGE_ME
  S3_SECRET_ACCESS_KEY: CHANGE_ME
  S3_BUCKET_NAME: sdkwork-im-media
  S3_REGION: us-east-1
  S3_ENDPOINT: https://s3.us-east-1.amazonaws.com
  # Push notification service credentials.
  FCM_SERVER_KEY: CHANGE_ME
  APNS_TEAM_ID: CHANGE_ME
  APNS_KEY_ID: CHANGE_ME
  APNS_PRIVATE_KEY: CHANGE_ME
---
# Per-service secret references (optional, services fall back to shared secrets).
apiVersion: v1
kind: Secret
metadata:
  name: session-gateway-secrets
  namespace: sdkwork-im
  labels:
    app.kubernetes.io/name: session-gateway
    app.kubernetes.io/part-of: sdkwork-im
type: Opaque
stringData:
  # Override shared secrets for session-gateway if needed.
  # DATABASE_URL: postgres://sdkwork_im:CHANGE_ME@postgres.database.svc:5432/sdkwork_im
  # REDIS_URL: redis://:CHANGE_ME@redis.cache.svc:6379/0
  PLACEHOLDER: "true"
