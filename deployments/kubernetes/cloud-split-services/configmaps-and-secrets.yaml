# ConfigMap and Secret templates for SDKWork IM cloud-split services.
# ConfigMaps contain non-sensitive runtime configuration shared across services.
# Secrets contain sensitive credentials (database URLs, Redis passwords, API keys).
# Apply with: kubectl apply -f configmaps-and-secrets.yaml
# Replace all placeholder values before production deployment.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sdkwork-im-shared-runtime
  namespace: sdkwork-im
  labels:
    app.kubernetes.io/part-of: sdkwork-im
data:
  # Shared runtime configuration consumed by all services via envFrom.
  SDKWORK_IM_ENVIRONMENT: production
  SDKWORK_IM_DEPLOYMENT_PROFILE: cloud
  SDKWORK_IM_SERVICE_LAYOUT: split-services
  # OpenTelemetry collector endpoint for distributed tracing.
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  # Log level: trace, debug, info, warn, error
  RUST_LOG: info
  # PostgreSQL connection pool defaults.
  DATABASE_POOL_MAX_CONNECTIONS: "20"
  DATABASE_POOL_ACQUIRE_TIMEOUT_SECONDS: "10"
  DATABASE_POOL_IDLE_TIMEOUT_SECONDS: "300"
  # Redis connection defaults.
  REDIS_POOL_MAX_CONNECTIONS: "10"
  REDIS_POOL_TIMEOUT_SECONDS: "5"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: session-gateway-runtime
  namespace: sdkwork-im
  labels:
    app.kubernetes.io/name: session-gateway
    app.kubernetes.io/part-of: sdkwork-im
data:
  SDKWORK_IM_SESSION_GATEWAY_BIND_ADDR: 0.0.0.0:18080
  SDKWORK_IM_REDIS_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc:4318
---
