version: 1
defaultProfile: cloud.split-services.production

profiles:
  cloud.split-services.production:
    install:
      layout: binary-package
    expose:
      - domain: im.sdkwork.com
        tls: sdkwork.com
        mode: web+api
        web: adaptive
        apiPathStyle: full-prefix
    packages:
      - flutter-mobile
      - harmony-mobile
      - mini-program-weixin
      - desktop-windows
      - desktop-macos
      - desktop-linux
    overrides:
      topology:
        spec: specs/topology.spec.json
        profile: cloud.split-services.production
        env: configs/topology/cloud.split-services.production.env
      kubernetes:
        reference: deployments/kubernetes/cloud-split-services/

  standalone.unified-process.development:
    install:
      layout: source-tree
    expose:
      - domain: localhost
        tls: off
        mode: web+api
        web: adaptive
        apiPathStyle: full-prefix
    packages: []
    overrides:
      topology:
        spec: specs/topology.spec.json
        profile: standalone.unified-process.development
        env: configs/topology/standalone.unified-process.development.env
