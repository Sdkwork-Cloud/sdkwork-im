[package]
name = "sdkwork-chat-pc"
version = "0.1.0"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "~2.11.0", features = ["tray-icon"] }
tauri-plugin-shell = "2"

[lib]
name = "sdkwork_chat_pc_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[workspace]
