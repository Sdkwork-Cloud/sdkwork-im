[package]
name = "craw-chat-cli"
edition.workspace = true
license.workspace = true
version.workspace = true

[dependencies]
base64 = "0.22.1"
bytes = "1.11.1"
craw-chat-ccp-binding-ws = { path = "../../crates/craw-chat-ccp-binding-ws" }
craw-chat-ccp-codec = { path = "../../crates/craw-chat-ccp-codec" }
craw-chat-ccp-codec-json = { path = "../../crates/craw-chat-ccp-codec-json" }
craw-chat-ccp-control = { path = "../../crates/craw-chat-ccp-control" }
craw-chat-ccp-core = { path = "../../crates/craw-chat-ccp-core" }
futures-util.workspace = true
hyper = { version = "1.9.0", features = ["client", "http1"] }
hyper-util = { version = "0.1.20", features = ["client", "client-legacy", "http1", "tokio"] }
http-body-util.workspace = true
im-app-context = { path = "../../crates/im-app-context" }
serde.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["io-std", "io-util"] }
tokio-tungstenite = "0.28.0"

[dev-dependencies]
axum.workspace = true
local-minimal-node = { path = "../../services/local-minimal-node" }
