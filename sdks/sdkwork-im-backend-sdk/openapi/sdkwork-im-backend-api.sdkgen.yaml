components:
  securitySchemes:
    AuthToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
    AccessToken:
      type: apiKey
      in: header
      name: Access-Token
  responses:
    BadRequestError:
      description: Request validation failed
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    UnauthorizedError:
      description: Bearer authentication failed or is missing
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    ForbiddenError:
      description: Caller is not allowed to access the resource
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    NotFoundError:
      description: Resource was not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    ConflictError:
      description: Request conflicts with the current resource state
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    ServiceUnavailableError:
      description: Required runtime capability or provider is unavailable
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
  schemas:
    ProblemDetail:
      type: object
      additionalProperties: true
      required:
        - type
        - title
        - status
        - detail
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        code:
          type: string
        message:
          type: string
        traceId:
          type: string
        retryable:
          type: boolean
    ActivateFriendshipRequest:
      additionalProperties: false
      properties:
        directChatId:
          nullable: true
          type: string
        establishedAt:
          type: string
        eventId:
          type: string
        friendshipId:
          type: string
        initiatorUserId:
          type: string
        peerUserId:
          type: string
      required:
        - friendshipId
        - eventId
        - initiatorUserId
        - peerUserId
        - establishedAt
      type: object
    ApplySharedChannelPolicyRequest:
      additionalProperties: false
      properties:
        appliedAt:
          type: string
        channelId:
          type: string
        connectionId:
          type: string
        conversationId:
          nullable: true
          type: string
        eventId:
          type: string
        historyVisibility:
          type: string
        policyId:
          type: string
        policyVersion:
          type: string
          format: int64
          pattern: ^[0-9]+$
          x-sdkwork-int64-string: true
          x-sdkwork-rust-type: i64
      required:
        - policyId
        - eventId
        - connectionId
        - channelId
        - policyVersion
        - historyVisibility
        - appliedAt
      type: object
    BindDirectChatRequest:
      additionalProperties: false
      properties:
        boundAt:
          type: string
        conversationId:
          type: string
        directChatId:
          type: string
        eventId:
          type: string
        leftActorId:
          type: string
        rightActorId:
          type: string
      required:
        - directChatId
        - eventId
        - leftActorId
        - rightActorId
        - conversationId
        - boundAt
      type: object
    BindExternalMemberLinkRequest:
      additionalProperties: false
      properties:
        connectionId:
          type: string
        eventId:
          type: string
        externalDisplayName:
          nullable: true
          type: string
        externalMemberId:
          type: string
        linkId:
          type: string
        linkedAt:
          type: string
        localActorId:
          type: string
        localActorKind:
          type: string
      required:
        - linkId
