parameters:
  SpaceIdPath:
    name: spaceId
    in: path
    required: true
    schema:
      type: string
      pattern: '^[0-9]+$'
      x-sdkwork-int64-string: true
  GroupIdPath:
    name: groupId
    in: path
    required: true
    schema:
      type: string
      pattern: '^[0-9]+$'
      x-sdkwork-int64-string: true
  ChannelIdPath:
    name: channelId
    in: path
    required: true
    schema:
      type: string
      pattern: '^[0-9]+$'
      x-sdkwork-int64-string: true
  UserIdPath:
    name: userId
    in: path
    required: true
    schema:
      type: string
  InviteCodePath:
    name: inviteCode
    in: path
    required: true
    schema:
      type: string
  RuleIdPath:
    name: ruleId
    in: path
    required: true
    schema:
      type: string
      pattern: '^[0-9]+$'
      x-sdkwork-int64-string: true
schemas:
  SpaceCreateRequest:
    type: object
    additionalProperties: false
    properties:
      spaceName:
        type: string
      spaceType:
        type: string
      description:
        type: string
        nullable: true
    required:
      - spaceName
      - spaceType
  SpaceUpdateRequest:
    type: object
    additionalProperties: false
    properties:
      spaceName:
        type: string
      description:
        type: string
        nullable: true
  SpaceView:
    type: object
    additionalProperties: false
    properties:
      spaceId:
        type: string
        pattern: '^[0-9]+$'
        x-sdkwork-int64-string: true
      spaceName:
        type: string
      spaceType:
        type: string
      ownerUserId:
        type: string
      createdAt:
        type: string
        format: date-time
    required:
      - spaceId
      - spaceName
      - spaceType
      - ownerUserId
      - createdAt
  SpaceListResponse:
    type: object
    additionalProperties: false
    properties:
      items:
        type: array
        items:
          $ref: '#/components/schemas/SpaceView'
    required:
      - items
  SpaceMemberCreateRequest:
    type: object
    additionalProperties: false
    properties:
      userId:
        type: string
      role:
        type: string
    required:
      - userId
  SpaceMemberUpdateRequest:
