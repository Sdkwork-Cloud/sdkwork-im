components:
  parameters:
    ConversationIdPath:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
    FavoriteIdPath:
      name: favoriteId
      in: path
      required: true
      schema:
        type: string
    FriendshipIdPath:
      name: friendshipId
      in: path
      required: true
      schema:
        type: string
    MessageIdPath:
      name: messageId
      in: path
      required: true
      schema:
        type: string
    RequestIdPath:
      name: requestId
      in: path
      required: true
      schema:
        type: string
    RtcSessionIdPath:
      name: rtcSessionId
      in: path
      required: true
      schema:
        type: string
    StreamIdPath:
      name: streamId
      in: path
      required: true
      schema:
        type: string
    TagIdPath:
      name: tagId
      in: path
      required: true
      schema:
        type: string
    TargetUserIdPath:
      name: targetUserId
      in: path
      required: true
      schema:
        type: string
    AfterSeqQuery:
      name: afterSeq
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 0
    CursorQuery:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    DirectionQuery:
      name: direction
      in: query
      required: false
      schema:
        type: string
        enum:
          - incoming
          - outgoing
    FavoriteTypeQuery:
      name: favoriteType
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/MessageFavoriteType'
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 200
    QQuery:
      name: q
      in: query
      required: false
      schema:
        type: string
        maxLength: 256
    StatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum:
          - pending
          - accepted
          - declined
          - canceled
          - expired
          - all
  schemas:
    AckResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
      required:
        - ok
    PresenceHeartbeatRequest:
      type: object
      additionalProperties: false
      properties:
        deviceId:
          type: string
          nullable: true
    PresenceView:
      type: object
      additionalProperties: false
      properties:
        tenantId:
          type: string
        principalId:
          type: string
        principalKind:
          type: string
        deviceId:
          type: string
        status:
          type: string
        updatedAt:
          type: string
          format: date-time
      required:
        - tenantId
        - principalId
        - principalKind
        - deviceId
        - status
        - updatedAt
    RealtimeSubscriptionSyncRequest:
      type: object
      additionalProperties: false
      properties:
        deviceId:
          type: string
          nullable: true
        conversations:
          type: array
          items:
            type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/RealtimeSubscriptionItemInput'
    RealtimeSubscriptionItemInput:
      type: object
      additionalProperties: false
      properties:
        scopeType:
          type: string
        scopeId:
          type: string
        eventTypes:
          type: array
          items:
            type: string
      required:
        - scopeType
        - scopeId
    RealtimeSubscriptionSyncResponse:
      type: object
      additionalProperties: false
      properties:
        subscriptions:
          type: array
          items:
            type: string
      required:
        - subscriptions
    RealtimeEventAckRequest:
      type: object
      additionalProperties: false
      properties:
        eventIds:
          type: array
          items:
            type: string
      required:
        - eventIds
    RealtimeEventView:
      type: object
      additionalProperties: false
      properties:
        eventId:
          type: string
        scope:
          type: string
        scopeId:
          type: string
        eventType:
          type: string
        payload:
          type: string
          nullable: true
        occurredAt:
          type: string
          format: date-time
      required:
        - eventId
        - scope
        - scopeId
        - eventType
        - occurredAt
    RealtimeEventsResponse:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RealtimeEventView'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean
      required:
        - items
        - hasMore
    RtcSession:
      type: object
      additionalProperties: false
      properties:
        tenantId:
          type: string
        rtcSessionId:
          type: string
        conversationId:
          type: string
          nullable: true
        initiatorId:
          type: string
        initiatorKind:
          type: string
        providerPluginId:
          type: string
          nullable: true
        providerSessionId:
          type: string
          nullable: true
        accessEndpoint:
          type: string
          nullable: true
        providerRegion:
          type: string
          nullable: true
        rtcMode:
          type: string
        state:
          type: string
        signalingStreamId:
          type: string
          nullable: true
        artifactMessageId:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - tenantId
        - rtcSessionId
        - rtcMode
        - initiatorId
        - initiatorKind
        - state
        - startedAt
    CreateRtcSessionRequest:
      type: object
      additionalProperties: false
      properties:
        rtcSessionId:
          type: string
        conversationId:
          type: string
          nullable: true
