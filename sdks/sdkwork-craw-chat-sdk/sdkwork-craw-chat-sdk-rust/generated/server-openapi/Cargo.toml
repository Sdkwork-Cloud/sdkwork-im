[package]
name = "sdkwork-craw-chat-backend-sdk"
version = "0.1.1"
edition = "2021"
description = "sdkwork-craw-chat-sdk SDK"
license = "MIT"
authors = ["SDKWork Team"]

[lib]
name = "sdkwork_craw_chat_backend_sdk"
path = "src/lib.rs"

[dependencies]
reqwest = { version = "0.12", default-features = false, features = ["json", "multipart", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"

[dev-dependencies]
tokio = { version = "1.0", features = ["macros", "rt-multi-thread"] }
