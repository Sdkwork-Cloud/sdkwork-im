        initiatorUserId:
          type: string
        peerUserId:
          type: string
      required:
        - friendshipId
        - eventId
        - initiatorUserId
        - peerUserId
        - establishedAt
      type: object
    ApplySharedChannelPolicyRequest:
      additionalProperties: false
      properties:
        appliedAt:
