    ProviderBindingCommitResponse:
      additionalProperties: true
      description: Provider binding mutation result after applying a control-plane policy change.
      properties: {}
      type: object
    ProviderBindingsResponse:
      additionalProperties: true
      description: Effective provider bindings resolved for the current tenant scope.
      properties: {}
      type: object
    ProviderPolicyDiffResponse:
      additionalProperties: true
      description: Provider policy diff between two committed versions.
      properties: {}
      type: object
    ProviderPolicyHistoryResponse:
      additionalProperties: true
      description: Provider policy history snapshot for the current tenant scope.
      properties: {}
      type: object
    ProviderPolicyRollbackRequest:
