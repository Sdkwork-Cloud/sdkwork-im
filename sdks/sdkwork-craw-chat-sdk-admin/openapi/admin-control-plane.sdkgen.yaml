                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Request conflicts with current control-plane state.
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Control-plane dependency is unavailable.
      security:
