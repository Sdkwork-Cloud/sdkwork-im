info:
  description: >-
    Live OpenAPI contract for the Craw Chat admin control-plane runtime. This document is emitted by the running service
    and is intended to be captured into the admin SDK workspace before generation.

    Derived sdkgen input mirrors the live authority snapshot for admin control-plane SDK generation.
  title: Craw Chat Admin Control Plane API
  version: 0.1.0
openapi: 3.0.3
paths:
  /api/v1/control/nodes/{node_id}/activate:
    post:
      operationId: activateNode
      parameters:
        - description: Realtime node identifier.
          in: path
          name: node_id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteNodeLifecycle'
          description: Successful response.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Invalid request.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Authentication required.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Permission denied.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Resource not found.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Request conflicts with current control-plane state.
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Control-plane dependency is unavailable.
      security:
        - bearerAuth: []
      summary: Activate a realtime node and clear drain state.
      tags:
        - nodes
  /api/v1/control/nodes/{node_id}/drain:
    post:
      operationId: drainNode
      parameters:
        - description: Realtime node identifier.
          in: path
          name: node_id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteNodeLifecycle'
          description: Successful response.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Invalid request.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Authentication required.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Permission denied.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Resource not found.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Request conflicts with current control-plane state.
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Control-plane dependency is unavailable.
      security:
        - bearerAuth: []
      summary: Mark a realtime node as draining.
      tags:
        - nodes
  /api/v1/control/nodes/{node_id}/routes/migrate:
    post:
      operationId: migrateNodeRoutes
      parameters:
        - description: Source realtime node identifier.
          in: path
          name: node_id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MigrateRoutesRequest'
        description: Route migration target payload.
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteMigrationResult'
          description: Successful response.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Invalid request.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Authentication required.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Permission denied.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Resource not found.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Request conflicts with current control-plane state.
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Control-plane dependency is unavailable.
      security:
        - bearerAuth: []
      summary: Migrate owned routes from the source node to the target node.
      tags:
        - nodes
  /api/v1/control/protocol-governance:
