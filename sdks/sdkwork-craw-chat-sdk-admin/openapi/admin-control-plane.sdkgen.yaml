                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Invalid request.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Authentication required.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Permission denied.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Resource not found.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Request conflicts with current control-plane state.
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlPlaneErrorResponse'
          description: Control-plane dependency is unavailable.
      security:
        - bearerAuth: []
      summary: Read the control-plane protocol registry snapshot.
      tags:
        - protocol
