        connectionId:
          type: string
        conversationId:
          nullable: true
          type: string
        eventId:
          type: string
        historyVisibility:
          type: string
        policyId:
          type: string
        policyVersion:
          format: int64
          type: integer
      required:
        - policyId
        - eventId
        - connectionId
        - channelId
        - policyVersion
        - historyVisibility
        - appliedAt
      type: object
    BindDirectChatRequest:
      additionalProperties: false
      properties:
        boundAt:
          type: string
        conversationId:
          type: string
        directChatId:
          type: string
        eventId:
          type: string
        leftActorId:
          type: string
        rightActorId:
          type: string
      required:
        - directChatId
        - eventId
        - leftActorId
        - rightActorId
        - conversationId
        - boundAt
      type: object
    BindExternalMemberLinkRequest:
      additionalProperties: false
      properties:
        connectionId:
          type: string
        eventId:
          type: string
        externalDisplayName:
          nullable: true
          type: string
        externalMemberId:
          type: string
        linkId:
          type: string
        linkedAt:
          type: string
        localActorId:
          type: string
        localActorKind:
          type: string
      required:
        - linkId
        - eventId
        - connectionId
        - localActorId
        - localActorKind
        - externalMemberId
        - linkedAt
      type: object
    BlockUserRequest:
      additionalProperties: false
      properties:
        blockId:
          type: string
        blockedUserId:
          type: string
        blockerUserId:
          type: string
        directChatId:
          nullable: true
          type: string
        effectiveAt:
          type: string
        eventId:
          type: string
        expiresAt:
          nullable: true
          type: string
        scope:
          type: string
      required:
        - blockId
        - eventId
        - blockerUserId
        - blockedUserId
        - scope
        - effectiveAt
      type: object
    BusinessPolicyVocabularyResponse:
      additionalProperties: false
      properties:
        capabilityFlagsField:
          type: string
        historyVisibilityField:
          type: string
        historyVisibilityModes:
          items:
            type: string
          type: array
        policyVersionField:
          type: string
        retentionPolicyRefField:
          type: string
        retentionPolicyScopes:
