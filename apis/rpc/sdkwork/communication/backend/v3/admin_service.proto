message ActivateRealtimeNodeResponse { RealtimeNodeView node = 1; sdkwork.common.v1.ResponseMetadata metadata = 15; }
message DrainRealtimeNodeRequest { string node_id = 1; string reason = 2; sdkwork.common.v1.RequestMetadata metadata = 15; }
message DrainRealtimeNodeResponse { RealtimeNodeView node = 1; sdkwork.common.v1.ResponseMetadata metadata = 15; }
message MigrateRealtimeNodeRoutesRequest { string source_node_id = 1; string target_node_id = 2; repeated string route_ids = 3; sdkwork.common.v1.RequestMetadata metadata = 15; }
message MigrateRealtimeNodeRoutesResponse { repeated RealtimeNodeView nodes = 1; sdkwork.common.v1.ResponseMetadata metadata = 15; }

