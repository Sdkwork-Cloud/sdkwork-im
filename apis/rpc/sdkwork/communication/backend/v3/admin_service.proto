message RetrieveExternalConnectionResponse { SocialAdminView resource = 1; sdkwork.common.v1.ResponseMetadata metadata = 15; }
message CreateExternalMemberLinkRequest { string member_link_json = 1; sdkwork.common.v1.RequestMetadata metadata = 15; }
message CreateExternalMemberLinkResponse { SocialAdminView resource = 1; sdkwork.common.v1.ResponseMetadata metadata = 15; }
message RetrieveExternalMemberLinkRequest { string member_link_id = 1; sdkwork.common.v1.RequestMetadata metadata = 15; }
message RetrieveExternalMemberLinkResponse { SocialAdminView resource = 1; sdkwork.common.v1.ResponseMetadata metadata = 15; }
message CreateManagedFriendRequestRequest { string requester_user_id = 1; string target_user_id = 2; sdkwork.common.v1.RequestMetadata metadata = 15; }
message CreateManagedFriendRequestResponse { SocialAdminView resource = 1; sdkwork.common.v1.ResponseMetadata metadata = 15; }
message RetrieveManagedFriendRequestRequest { string friend_request_id = 1; sdkwork.common.v1.RequestMetadata metadata = 15; }
message RetrieveManagedFriendRequestResponse { SocialAdminView resource = 1; sdkwork.common.v1.ResponseMetadata metadata = 15; }
