message CancelManagedFriendRequestRequest { string friend_request_id = 1; sdkwork.common.v1.RequestMetadata metadata = 15; }
message CancelManagedFriendRequestResponse { SocialAdminView resource = 1; sdkwork.common.v1.ResponseMetadata metadata = 15; }
message CreateManagedFriendshipRequest { string first_user_id = 1; string second_user_id = 2; sdkwork.common.v1.RequestMetadata metadata = 15; }
