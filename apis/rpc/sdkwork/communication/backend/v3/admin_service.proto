message RetrieveProtocolGovernanceResponse { AdminStatusView governance = 1; sdkwork.common.v1.ResponseMetadata metadata = 15; }
message RetrieveProtocolRegistryRequest { sdkwork.common.v1.RequestMetadata metadata = 15; }
message RetrieveProtocolRegistryResponse { AdminStatusView registry = 1; sdkwork.common.v1.ResponseMetadata metadata = 15; }
message ListProviderPoliciesRequest { sdkwork.common.v1.PageRequest page = 1; sdkwork.common.v1.RequestMetadata metadata = 15; }
message ListProviderPoliciesResponse { repeated ProviderPolicyView policies = 1; sdkwork.common.v1.PageResponse page = 2; sdkwork.common.v1.ResponseMetadata metadata = 15; }
message PreviewProviderPolicyRequest { string policy_json = 1; sdkwork.common.v1.RequestMetadata metadata = 15; }
message PreviewProviderPolicyResponse { ProviderPolicyView policy = 1; sdkwork.common.v1.ResponseMetadata metadata = 15; }
message RollbackProviderPolicyRequest { string target_version = 1; sdkwork.common.v1.RequestMetadata metadata = 15; }
message RollbackProviderPolicyResponse { ProviderPolicyView policy = 1; sdkwork.common.v1.ResponseMetadata metadata = 15; }
message RetrieveProviderRegistryRequest { sdkwork.common.v1.RequestMetadata metadata = 15; }
message RetrieveProviderRegistryResponse { AdminStatusView registry = 1; sdkwork.common.v1.ResponseMetadata metadata = 15; }
message ListControlProviderBindingsRequest { sdkwork.common.v1.PageRequest page = 1; sdkwork.common.v1.RequestMetadata metadata = 15; }
message ListControlProviderBindingsResponse { repeated AdminStatusView bindings = 1; sdkwork.common.v1.PageResponse page = 2; sdkwork.common.v1.ResponseMetadata metadata = 15; }
message CreateControlProviderBindingRequest { string binding_json = 1; sdkwork.common.v1.RequestMetadata metadata = 15; }
message CreateControlProviderBindingResponse { AdminStatusView binding = 1; sdkwork.common.v1.ResponseMetadata metadata = 15; }

message CreateDirectChatBindingRequest { string first_user_id = 1; string second_user_id = 2; sdkwork.common.v1.RequestMetadata metadata = 15; }
message CreateDirectChatBindingResponse { SocialAdminView resource = 1; sdkwork.common.v1.ResponseMetadata metadata = 15; }
message RetrieveDirectChatRequest { string direct_chat_id = 1; sdkwork.common.v1.RequestMetadata metadata = 15; }
message RetrieveDirectChatResponse { SocialAdminView resource = 1; sdkwork.common.v1.ResponseMetadata metadata = 15; }
message CreateExternalConnectionRequest { string connection_json = 1; sdkwork.common.v1.RequestMetadata metadata = 15; }
message CreateExternalConnectionResponse { SocialAdminView resource = 1; sdkwork.common.v1.ResponseMetadata metadata = 15; }
