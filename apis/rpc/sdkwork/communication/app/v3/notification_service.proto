syntax = "proto3";

package sdkwork.communication.app.v3;

import "sdkwork/common/v1/context.proto";

option java_multiple_files = true;
option java_package = "com.sdkwork.communication.app.v3";
option go_package = "github.com/sdkwork/im-rpc-sdk-go/generated/proto/sdkwork/communication/app/v3;communicationappv3";

service NotificationService {
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse);
  rpc CreateNotificationRequest(CreateNotificationRequestRequest) returns (CreateNotificationRequestResponse);
  rpc RetrieveNotification(RetrieveNotificationRequest) returns (RetrieveNotificationResponse);
  rpc WatchNotifications(WatchNotificationsRequest) returns (stream WatchNotificationsResponse);
}

message NotificationView {
  string notification_id = 1;
  string notification_type = 2;
  string title = 3;
  string body = 4;
  string state = 5;
}

message ListNotificationsRequest {
  string state = 1;
  sdkwork.common.v1.PageRequest page = 2;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message ListNotificationsResponse {
  repeated NotificationView notifications = 1;
  sdkwork.common.v1.PageResponse page = 2;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message CreateNotificationRequestRequest {
  string notification_type = 1;
  string title = 2;
  string body = 3;
  repeated string recipient_user_ids = 4;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message CreateNotificationRequestResponse {
  NotificationView notification = 1;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message RetrieveNotificationRequest {
  string notification_id = 1;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message RetrieveNotificationResponse {
  NotificationView notification = 1;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message WatchNotificationsRequest {
  string cursor = 1;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message WatchNotificationsResponse {
  NotificationView notification = 1;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}
