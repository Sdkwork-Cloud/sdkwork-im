syntax = "proto3";

package sdkwork.communication.app.v3;

import "sdkwork/common/v1/context.proto";
import "sdkwork/common/v1/media.proto";

option java_multiple_files = true;
option java_package = "com.sdkwork.communication.app.v3";
option go_package = "github.com/sdkwork/im-rpc-sdk-go/generated/proto/sdkwork/communication/app/v3;communicationappv3";

service MessageService {
  rpc ListConversationMessages(ListConversationMessagesRequest) returns (ListConversationMessagesResponse);
  rpc CreateConversationMessage(CreateConversationMessageRequest) returns (CreateConversationMessageResponse);
  rpc PublishSystemChannelMessage(PublishSystemChannelMessageRequest) returns (PublishSystemChannelMessageResponse);
  rpc RetrieveMessageInteractionSummary(RetrieveMessageInteractionSummaryRequest) returns (RetrieveMessageInteractionSummaryResponse);
  rpc EditMessage(EditMessageRequest) returns (EditMessageResponse);
  rpc RecallMessage(RecallMessageRequest) returns (RecallMessageResponse);
  rpc ListFavoriteMessages(ListFavoriteMessagesRequest) returns (ListFavoriteMessagesResponse);
  rpc CreateMessageFavorite(CreateMessageFavoriteRequest) returns (CreateMessageFavoriteResponse);
  rpc DeleteMessageFavorite(DeleteMessageFavoriteRequest) returns (DeleteMessageFavoriteResponse);
  rpc DeleteMessageVisibility(DeleteMessageVisibilityRequest) returns (DeleteMessageVisibilityResponse);
  rpc CreateMessageReaction(CreateMessageReactionRequest) returns (CreateMessageReactionResponse);
  rpc DeleteMessageReaction(DeleteMessageReactionRequest) returns (DeleteMessageReactionResponse);
  rpc PinMessage(PinMessageRequest) returns (PinMessageResponse);
  rpc UnpinMessage(UnpinMessageRequest) returns (UnpinMessageResponse);
}

message MessageBodyPart {
  string kind = 1;
  string text = 2;
  sdkwork.common.v1.MediaResource media = 3;
  string payload_json = 4;
}

message MessageView {
  string message_id = 1;
  string conversation_id = 2;
  string sender_user_id = 3;
  repeated MessageBodyPart body_parts = 4;
  string state = 5;
  string created_at = 6;
}

message MessageInteractionSummaryView {
  string message_id = 1;
  int64 reaction_count = 2;
  int64 reply_count = 3;
  bool pinned = 4;
  bool favorited = 5;
}

message MessageFavoriteView {
  string favorite_id = 1;
  string message_id = 2;
  string created_at = 3;
}

message MessageMutationResponse {
  MessageView message = 1;
  string status = 2;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message ListConversationMessagesRequest {
  string conversation_id = 1;
  sdkwork.common.v1.PageRequest page = 2;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message ListConversationMessagesResponse {
  repeated MessageView messages = 1;
  sdkwork.common.v1.PageResponse page = 2;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message CreateConversationMessageRequest {
  string conversation_id = 1;
  repeated MessageBodyPart body_parts = 2;
  string reply_to_message_id = 3;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message CreateConversationMessageResponse {
  MessageView message = 1;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message PublishSystemChannelMessageRequest {
  string conversation_id = 1;
  repeated MessageBodyPart body_parts = 2;
  string capability = 3;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message PublishSystemChannelMessageResponse {
  MessageView message = 1;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message RetrieveMessageInteractionSummaryRequest {
  string message_id = 1;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message RetrieveMessageInteractionSummaryResponse {
  MessageInteractionSummaryView summary = 1;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message EditMessageRequest {
  string message_id = 1;
  repeated MessageBodyPart body_parts = 2;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message EditMessageResponse {
  MessageMutationResponse result = 1;
}

message RecallMessageRequest {
  string message_id = 1;
  string reason = 2;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message RecallMessageResponse {
  MessageMutationResponse result = 1;
}

message ListFavoriteMessagesRequest {
  sdkwork.common.v1.PageRequest page = 1;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message ListFavoriteMessagesResponse {
  repeated MessageFavoriteView favorites = 1;
  sdkwork.common.v1.PageResponse page = 2;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message CreateMessageFavoriteRequest {
  string message_id = 1;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message CreateMessageFavoriteResponse {
  MessageFavoriteView favorite = 1;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message DeleteMessageFavoriteRequest {
  string favorite_id = 1;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message DeleteMessageFavoriteResponse {
  string favorite_id = 1;
  string status = 2;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message DeleteMessageVisibilityRequest {
  string message_id = 1;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message DeleteMessageVisibilityResponse {
  string message_id = 1;
  string status = 2;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message CreateMessageReactionRequest {
  string message_id = 1;
  string reaction = 2;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message CreateMessageReactionResponse {
  MessageInteractionSummaryView summary = 1;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message DeleteMessageReactionRequest {
  string message_id = 1;
  string reaction = 2;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message DeleteMessageReactionResponse {
  MessageInteractionSummaryView summary = 1;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message PinMessageRequest {
  string message_id = 1;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message PinMessageResponse {
  MessageInteractionSummaryView summary = 1;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message UnpinMessageRequest {
  string message_id = 1;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message UnpinMessageResponse {
  MessageInteractionSummaryView summary = 1;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}
