syntax = "proto3";

package sdkwork.communication.app.v3;

import "sdkwork/common/v1/context.proto";

option java_multiple_files = true;
option java_package = "com.sdkwork.communication.app.v3";
option go_package = "github.com/sdkwork/im-rpc-sdk-go/generated/proto/sdkwork/communication/app/v3;communicationappv3";

service CallService {
  rpc CreateCallSession(CreateCallSessionRequest) returns (CreateCallSessionResponse);
  rpc RetrieveCallSession(RetrieveCallSessionRequest) returns (RetrieveCallSessionResponse);
  rpc InviteCallSession(InviteCallSessionRequest) returns (InviteCallSessionResponse);
  rpc AcceptCallSession(AcceptCallSessionRequest) returns (AcceptCallSessionResponse);
  rpc RejectCallSession(RejectCallSessionRequest) returns (RejectCallSessionResponse);
  rpc EndCallSession(EndCallSessionRequest) returns (EndCallSessionResponse);
  rpc CreateCallSignal(CreateCallSignalRequest) returns (CreateCallSignalResponse);
  rpc CreateCallCredential(CreateCallCredentialRequest) returns (CreateCallCredentialResponse);
  rpc WatchCallSignals(WatchCallSignalsRequest) returns (stream WatchCallSignalsResponse);
}

message CallSessionView {
  string call_session_id = 1;
  string conversation_id = 2;
  string mode = 3;
  string state = 4;
  string signaling_stream_id = 5;
}

message CallSignalView {
  string signal_id = 1;
  string call_session_id = 2;
  string sender_user_id = 3;
  string signal_type = 4;
  string payload_json = 5;
}

message CallCredentialView {
  string call_session_id = 1;
  string provider = 2;
  string credential_json = 3;
  string expires_at = 4;
}

message CreateCallSessionRequest {
  string conversation_id = 1;
  string mode = 2;
  repeated string invitee_user_ids = 3;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message CreateCallSessionResponse {
  CallSessionView session = 1;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message RetrieveCallSessionRequest {
  string call_session_id = 1;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message RetrieveCallSessionResponse {
  CallSessionView session = 1;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message InviteCallSessionRequest {
  string call_session_id = 1;
  repeated string invitee_user_ids = 2;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message InviteCallSessionResponse {
  CallSessionView session = 1;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message AcceptCallSessionRequest {
  string call_session_id = 1;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message AcceptCallSessionResponse {
  CallSessionView session = 1;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message RejectCallSessionRequest {
  string call_session_id = 1;
  string reason = 2;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message RejectCallSessionResponse {
  CallSessionView session = 1;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message EndCallSessionRequest {
  string call_session_id = 1;
  string reason = 2;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message EndCallSessionResponse {
  CallSessionView session = 1;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message CreateCallSignalRequest {
  string call_session_id = 1;
  string signal_type = 2;
  string payload_json = 3;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message CreateCallSignalResponse {
  CallSignalView signal = 1;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message CreateCallCredentialRequest {
  string call_session_id = 1;
  string provider = 2;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message CreateCallCredentialResponse {
  CallCredentialView credential = 1;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}

message WatchCallSignalsRequest {
  string call_session_id = 1;
  string cursor = 2;
  sdkwork.common.v1.RequestMetadata metadata = 15;
}

message WatchCallSignalsResponse {
  CallSignalView signal = 1;
  sdkwork.common.v1.ResponseMetadata metadata = 15;
}
