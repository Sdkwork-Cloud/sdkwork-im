components:
  parameters:
    ConversationIdPath:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
    FavoriteIdPath:
      name: favoriteId
      in: path
      required: true
      schema:
        type: string
    FriendshipIdPath:
      name: friendshipId
      in: path
      required: true
      schema:
        type: string
    MessageIdPath:
      name: messageId
      in: path
      required: true
      schema:
        type: string
    RequestIdPath:
      name: requestId
      in: path
      required: true
      schema:
        type: string
    RoomIdPath:
      name: roomId
      in: path
      required: true
      schema:
        type: string
    RtcSessionIdPath:
      name: rtcSessionId
      in: path
      required: true
      schema:
        type: string
    StreamIdPath:
      name: streamId
      in: path
      required: true
      schema:
        type: string
    TagIdPath:
      name: tagId
      in: path
      required: true
      schema:
        type: string
    TargetUserIdPath:
      name: targetUserId
      in: path
      required: true
      schema:
        type: string
    AfterSeqQuery:
      name: afterSeq
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 0
    CursorQuery:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    DirectionQuery:
      name: direction
      in: query
      required: false
      schema:
        type: string
        enum:
          - incoming
          - outgoing
    FavoriteTypeQuery:
      name: favoriteType
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/MessageFavoriteType'
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 200
    QQuery:
      name: q
      in: query
      required: false
      schema:
        type: string
        maxLength: 256
    StatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum:
          - pending
          - accepted
          - declined
          - canceled
          - expired
          - all
    SpaceIdPath:
      name: spaceId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9]+$
        x-sdkwork-int64-string: true
    GroupIdPath:
      name: groupId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9]+$
        x-sdkwork-int64-string: true
    ChannelIdPath:
      name: channelId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9]+$
        x-sdkwork-int64-string: true
    UserIdPath:
      name: userId
      in: path
      required: true
      schema:
        type: string
    InviteCodePath:
      name: inviteCode
      in: path
      required: true
      schema:
        type: string
    RuleIdPath:
      name: ruleId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9]+$
        x-sdkwork-int64-string: true
  schemas:
    AckResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
      required:
        - ok
    PresenceHeartbeatRequest:
      type: object
      additionalProperties: false
      properties:
        deviceId:
          type: string
          nullable: true
    PresenceView:
      type: object
      additionalProperties: false
      properties:
        tenantId:
          type: string
        principalId:
          type: string
        principalKind:
          type: string
        deviceId:
          type: string
        status:
          type: string
        updatedAt:
          type: string
          format: date-time
      required:
        - tenantId
        - principalId
        - principalKind
        - deviceId
        - status
        - updatedAt
    RealtimeSubscriptionSyncRequest:
      type: object
      additionalProperties: false
      properties:
        deviceId:
          type: string
          nullable: true
        conversations:
          type: array
          items:
            type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/RealtimeSubscriptionItemInput'
    RealtimeSubscriptionItemInput:
      type: object
      additionalProperties: false
      properties:
        scopeType:
          type: string
        scopeId:
          type: string
        eventTypes:
          type: array
          items:
            type: string
      required:
        - scopeType
        - scopeId
    RealtimeSubscriptionSyncResponse:
      type: object
      additionalProperties: false
      properties:
        subscriptions:
          type: array
          items:
            type: string
      required:
        - subscriptions
    RealtimeWebSocketHandshake:
      type: object
      additionalProperties: false
      properties:
        endpoint:
          type: string
        protocol:
          type: string
      required:
        - endpoint
        - protocol
