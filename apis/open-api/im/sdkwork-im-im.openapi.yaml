        scope:
          type: string
        scopeId:
          type: string
        eventType:
          type: string
        payload:
          type: string
          nullable: true
        occurredAt:
          type: string
          format: date-time
      required:
        - eventId
        - scope
        - scopeId
        - eventType
        - occurredAt
    RtcSession:
