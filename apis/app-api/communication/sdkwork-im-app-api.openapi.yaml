components:
  securitySchemes:
    AuthToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
    AccessToken:
      type: apiKey
      in: header
      name: Access-Token
  parameters:
    StreamIdPath:
      name: streamId
      in: path
      required: true
      schema:
        type: string
    ExecutionIdPath:
      in: path
      name: executionId
      required: true
      schema:
        type: string
    NotificationIdPath:
      in: path
      name: notificationId
      required: true
      schema:
        type: string
    ToolCallIdPath:
      in: path
      name: toolCallId
      required: true
      schema:
        type: string
  responses:
    BadRequestError:
      description: Request validation failed
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    UnauthorizedError:
      description: Bearer authentication failed or is missing
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    ForbiddenError:
      description: Caller is not allowed to access the resource
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    NotFoundError:
      description: Resource was not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    ConflictError:
      description: Request conflicts with the current resource state
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    ServiceUnavailableError:
      description: Required runtime capability or provider is unavailable
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
  schemas:
    StringMap:
      type: object
      additionalProperties:
        type: string
    PortalSnapshot:
      type: object
      additionalProperties: true
    PortalWorkspaceView:
      type: object
      required:
        - name
        - slug
        - tier
        - region
        - supportPlan
        - seats
        - activeBrands
        - uptime
      properties:
        name:
          type: string
        slug:
          type: string
        tier:
          type: string
        region:
          type: string
        supportPlan:
          type: string
        seats:
          type: integer
          format: int32
        activeBrands:
          type: integer
          format: int32
        uptime:
          type: string
    Sender:
      type: object
      required:
        - id
        - kind
        - metadata
      properties:
        id:
          type: string
        kind:
          type: string
        memberId:
          type: string
        deviceId:
          type: string
        sessionId:
          type: string
        metadata:
          $ref: '#/components/schemas/StringMap'
    StreamDurabilityClass:
      type: string
      enum:
        - transient
        - durableSession
        - eventLog
    StreamSessionState:
      type: string
      enum:
        - created
        - opened
        - active
        - checkpointed
        - completed
        - aborted
        - expired
    StreamSession:
      type: object
      required:
        - tenantId
        - streamId
        - streamType
        - scopeKind
        - scopeId
        - durabilityClass
        - orderingScope
        - state
        - lastFrameSeq
        - openedAt
      properties:
        tenantId:
          type: string
        streamId:
          type: string
        streamType:
          type: string
        scopeKind:
          type: string
        scopeId:
          type: string
        durabilityClass:
          $ref: '#/components/schemas/StreamDurabilityClass'
        orderingScope:
          type: string
        schemaRef:
          type: string
        state:
          $ref: '#/components/schemas/StreamSessionState'
        lastFrameSeq:
          type: string
          format: int64
          pattern: ^[0-9]+$
          x-sdkwork-int64-string: true
          x-sdkwork-rust-type: i64
        lastCheckpointSeq:
          type: string
          format: int64
          pattern: ^[0-9]+$
          x-sdkwork-int64-string: true
          x-sdkwork-rust-type: i64
        resultMessageId:
          type: string
        openedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
    StreamFrame:
      type: object
      required:
        - tenantId
        - streamId
        - streamType
        - scopeKind
        - scopeId
        - frameSeq
        - frameType
        - encoding
        - payload
        - sender
        - attributes
        - occurredAt
      properties:
        tenantId:
          type: string
        streamId:
          type: string
        streamType:
          type: string
        scopeKind:
          type: string
        scopeId:
          type: string
        frameSeq:
          type: string
          format: int64
          pattern: ^[0-9]+$
          x-sdkwork-int64-string: true
          x-sdkwork-rust-type: i64
        frameType:
          type: string
        schemaRef:
          type: string
        encoding:
          type: string
        payload:
          type: string
        sender:
          $ref: '#/components/schemas/Sender'
        attributes:
          $ref: '#/components/schemas/StringMap'
        occurredAt:
          type: string
          format: date-time
    ProblemDetail:
      type: object
      additionalProperties: true
      required:
        - type
        - title
        - status
        - code
        - traceId
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
