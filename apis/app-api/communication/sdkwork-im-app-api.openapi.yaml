              schema:
                allOf:
                  - $ref: '#/components/schemas/SdkWorkApiResponse'
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        required:
                          - item
                        properties:
                          item:
                            $ref: '#/components/schemas/StreamSession'
        '400':
          description: Problem detail response
