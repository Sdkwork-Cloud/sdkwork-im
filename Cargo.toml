[workspace]
members = [
    "adapters/local-disk",
    "adapters/local-memory",
    "crates/im-auth-context",
    "crates/im-domain-core",
    "crates/im-domain-events",
    "crates/im-platform-contracts",
    "crates/im-time",
    "services/automation-service",
    "services/audit-service",
    "services/notification-service",
    "services/ops-service",
    "services/control-plane-api",
    "services/conversation-runtime",
    "services/local-minimal-node",
    "services/media-service",
    "services/projection-service",
    "services/rtc-signaling-service",
    "services/session-gateway",
    "services/streaming-service",
    "tools/chat-cli",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT"
version = "0.1.0"

[workspace.dependencies]
axum = { version = "0.8.8", features = ["ws"] }
futures-util = { version = "0.3.32", features = ["sink"] }
http-body-util = "0.1.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tokio = { version = "1.48.0", features = ["macros", "rt-multi-thread", "net", "sync", "time"] }
tower = { version = "0.5.3", features = ["util"] }
