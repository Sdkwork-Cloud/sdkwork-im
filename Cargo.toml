[workspace]
members = [
    "adapters/local-disk",
    "adapters/local-memory",
    "adapters/postgres-realtime",
    "adapters/object-storage-s3",
    "crates/craw-chat-contract-admin",
    "crates/craw-chat-contract-agent",
    "crates/craw-chat-contract-control",
    "crates/craw-chat-contract-core",
    "crates/craw-chat-contract-message",
    "crates/craw-chat-contract-notification",
    "crates/craw-chat-contract-stream",
    "crates/craw-chat-api-registry",
    "crates/craw-chat-gateway-config",
    "crates/craw-chat-gateway-observability",
    "crates/craw-chat-openapi",
    "crates/sdkwork-im-rpc-service-rust",
    "crates/im-storage-contracts",
    "crates/im-storage-runtime",
    "crates/craw-chat-runtime-link",
    "crates/craw-chat-runtime-route",
    "crates/craw-chat-runtime-id",
    "crates/sdkwork-api-config",
    "crates/sdkwork-api-product-runtime",
    "crates/im-app-context",
    "crates/craw-chat-ccp-binding-http",
    "crates/craw-chat-ccp-binding-mqtt",
    "crates/craw-chat-ccp-binding-sse",
    "crates/craw-chat-ccp-binding-ws",
    "crates/craw-chat-ccp-codec",
    "crates/craw-chat-ccp-codec-cbor",
    "crates/craw-chat-ccp-codec-json",
    "crates/craw-chat-ccp-control",
    "crates/craw-chat-ccp-core",
    "crates/craw-chat-ccp-registry",
    "crates/im-domain-core",
    "crates/im-domain-events",
    "crates/im-platform-contracts",
    "crates/im-postgres-realtime-contracts",
    "crates/im-time",
    "services/automation-service",
    "services/audit-service",
    "services/notification-service",
    "services/ops-service",
    "services/control-plane-api",
    "services/conversation-runtime",
    "services/local-minimal-node",
    "services/media-service",
    "services/projection-service",
    "services/session-gateway",
    "services/streaming-service",
    "services/web-gateway",
    "tools/chat-cli",
]
exclude = [
    "sdks/sdkwork-im-rpc-sdk/sdkwork-im-rpc-sdk-rust",
    "vendor/ciborium-0.2.2",
    "vendor/ciborium-io-0.2.2",
    "vendor/ciborium-ll-0.2.2",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "AGPL-3.0-or-later"
version = "0.1.0"

[workspace.dependencies]
axum = { version = "0.8.8", features = ["ws"] }
futures-util = { version = "0.3.32", features = ["sink"] }
http-body-util = "0.1.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tokio = { version = "1.48.0", features = ["macros", "rt-multi-thread", "net", "signal", "sync", "time"] }
tower = { version = "0.5.3", features = ["util"] }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
# Internal SDKWork workspace members - declared once at workspace root
im-adapters-local-disk = { path = "adapters/local-disk" }
im-storage-contracts = { path = "crates/im-storage-contracts" }
im-storage-runtime = { path = "crates/im-storage-runtime" }
sdkwork-api-config = { path = "crates/sdkwork-api-config" }
# Cross-repository SDKWork dependencies
sdkwork_id = { path = "../sdkwork-appbase/packages/native-rust/foundation/sdkwork-id-rust" }
sdkwork_iam_core = { path = "../sdkwork-appbase/packages/native-rust/iam/sdkwork-iam-core-rust" }
sdkwork_iam_http = { path = "../sdkwork-appbase/packages/native-rust/iam/sdkwork-iam-http-rust" }
sdkwork_http_context = { path = "../sdkwork-appbase/packages/native-rust/foundation/sdkwork-http-context-rust" }
sdkwork-rtc-adapter-agora = { path = "../sdkwork-rtc/adapters/rtc-agora" }
sdkwork-rtc-adapter-aliyun = { path = "../sdkwork-rtc/adapters/rtc-aliyun" }
sdkwork-rtc-adapter-livekit = { path = "../sdkwork-rtc/adapters/rtc-livekit" }
sdkwork-rtc-adapter-tencent = { path = "../sdkwork-rtc/adapters/rtc-tencent" }
sdkwork-rtc-adapter-volcengine = { path = "../sdkwork-rtc/adapters/rtc-volcengine" }
sdkwork-rtc-core = { path = "../sdkwork-rtc/crates/sdkwork-rtc-core" }
sdkwork-rtc-app-context = { path = "../sdkwork-rtc/crates/sdkwork-rtc-app-context" }
sdkwork-agent-business = { path = "../sdkwork-kernel/sdkwork-agent-business", features = ["http-axum"] }
sdkwork-aiot-contract = { path = "../sdkwork-aiot/crates/sdkwork-aiot-contract" }
sdkwork-aiot-http-api = { path = "../sdkwork-aiot/crates/sdkwork-aiot-http-api" }
sdkwork-aiot-runtime = { path = "../sdkwork-aiot/crates/sdkwork-aiot-runtime" }
sdkwork-aiot-transport = { path = "../sdkwork-aiot/crates/sdkwork-aiot-transport" }

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true
opt-level = 3
